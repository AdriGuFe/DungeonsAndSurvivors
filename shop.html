<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dungeons and Survivors - Tienda</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/coin-animation.css">
    <style>
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'LifeCraft', 'Cinzel', serif; }
        .shop-bg { position: fixed; inset: 0; background: url('assets/Terrain/Ground/Tilemap_Flat.png') center/cover; filter: blur(4px) brightness(0.4); z-index: -1; pointer-events: none; }
        .armory-container { width: min(95%, 1000px); background: rgba(20, 25, 40, 0.9); border: 4px solid #3b6ea5; border-radius: 12px; padding: clamp(15px, 4vw, 40px); text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .armory-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 30px; gap: 20px; flex-wrap: wrap; }
        .armory-header h1 { margin: 0; font-size: clamp(24px, 5vw, 48px); color: #c9a227; font-family: 'LifeCraft'; letter-spacing: 2px; text-shadow: 0 0 15px rgba(201,162,39,0.5); }
        .armory-coins { font-size: clamp(24px, 4vw, 38px); color: #ffd700; font-weight: bold; text-shadow: 0 2px 5px #000; font-family: 'LifeCraft', Cinzel, serif; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .armory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .troop-card { background: rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s, border-color 0.2s; cursor: pointer; user-select: none; }
        .troop-card:hover { transform: translateY(-5px); border-color: #5b9bd5; background: rgba(91,155,213,0.3); }
        .troop-card.disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; transform: none; border-color: #555; background: rgba(0,0,0,0.5); }
        .troop-card img { width: 80px; height: 80px; margin-bottom: 10px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); }
        .troop-card .name { font-size: 24px; color: #e8f4ff; margin-bottom: 5px; font-weight: bold; font-family: 'LifeCraft'; letter-spacing: 1px; }
        .troop-card .cost { color: #ffd700; font-size: 26px; font-weight: bold; font-family: 'LifeCraft', Cinzel, serif; letter-spacing: 1px; }
        .queue-container { background: rgba(0,0,0,0.4); padding: clamp(15px, 3vw, 30px); border-radius: 8px; margin-bottom: 30px; text-align: left; min-height: clamp(80px, 15vh, 160px); border: 1px solid #444; }
        .queue-title { margin: 0 0 15px 0; font-size: clamp(18px, 3vw, 28px); color: #b0bec5; font-family: 'LifeCraft'; letter-spacing: 1px; }
        .queue-list { display: flex; gap: clamp(8px, 1.5vw, 15px); flex-wrap: wrap; }
        .queue-item { background: #3b6ea5; padding: clamp(5px, 1vw, 10px) clamp(10px, 2vw, 20px); border-radius: 30px; font-weight: bold; font-size: clamp(14px, 2vw, 22px); display: flex; align-items: center; gap: clamp(6px, 1vw, 12px); box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .queue-item img { width: clamp(24px, 3vw, 40px); height: clamp(24px, 3vw, 40px); }
        .queue-item span { cursor: pointer; color: #ff6b6b; font-weight: bold; padding: 0 8px; font-size: clamp(18px, 2.5vw, 24px); }
        .queue-item span:hover { color: #ff0000; }
        .btn-finish { background: linear-gradient(180deg, #c9a227, #967512); border: 2px solid #fff; padding: clamp(10px, 2vw, 15px) clamp(20px, 4vw, 40px); font-size: clamp(18px, 3vw, 28px); font-family: 'LifeCraft'; color: #fff; cursor: pointer; border-radius: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: transform 0.2s, filter 0.2s; width: min(100%, 500px); }
        .btn-finish:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body class="game-page">
    <!-- Pre-carga de monedas para evitar parpadeos -->
    <div style="display:none; visibility:hidden; width:0; height:0; position:absolute; left:-9999px;">
        <img src="assets/Coin/Coin1.png" alt=""><img src="assets/Coin/Coin2.png" alt=""><img src="assets/Coin/Coin3.png" alt="">
        <img src="assets/Coin/Coin4.png" alt=""><img src="assets/Coin/Coin5.png" alt=""><img src="assets/Coin/Coin6.png" alt="">
        <img src="assets/Coin/Coin7.png" alt=""><img src="assets/Coin/Coin8.png" alt=""><img src="assets/Coin/Coin9.png" alt="">
    </div>

    <div class="shop-bg"></div>
    <div class="sound-controls">
        <button type="button" class="sfx-toggle" id="sfxToggle" title="Silenciar efectos de sonido" aria-label="Silenciar o activar efectos de sonido">
            <span class="sfx-label">SFX</span>
            <span class="sfx-mute-overlay">
                <img src="assets/UI Elements/UI Elements/Icons/Icon_09.png" alt="" aria-hidden="true">
            </span>
        </button>
        <button type="button" class="music-toggle" id="battleMusicToggle" title="Reproducir musica" aria-label="Reproducir o silenciar musica">
            <img id="battleMusicIcon" src="assets/UI Elements/UI Elements/Icons/Icon_12.png" alt="Musica">
            <span class="music-mute-overlay">
                <img src="assets/UI Elements/UI Elements/Icons/Icon_09.png" alt="" aria-hidden="true">
            </span>
        </button>
    </div>

    <div class="armory-container">
        <div class="armory-header">
            <h1 id="shopLevelTitle">Puesto Avanzado - Oleada 1</h1>
            <div class="armory-coins"><div class="coin-icon large"></div> <span id="shopCoins">100</span></div>
        </div>
        <div class="armory-grid">
            <div class="troop-card" data-role="WARRIOR" data-cost="35">
                <img src="assets/UI Elements/UI Elements/Human Avatars/Warrior.png" alt="Warrior">
                <div class="name">Guerrero</div><div class="cost">35 <div class="coin-icon"></div></div>
            </div>
            <div class="troop-card" data-role="ROGUE" data-cost="30">
                <img src="assets/UI Elements/UI Elements/Human Avatars/Rogue.png" alt="Rogue">
                <div class="name">Picaro</div><div class="cost">30 <div class="coin-icon"></div></div>
            </div>
            <div class="troop-card" data-role="ARCHER" data-cost="30">
                <img src="assets/UI Elements/UI Elements/Human Avatars/Archer.png" alt="Archer">
                <div class="name">Arquero</div><div class="cost">30 <div class="coin-icon"></div></div>
            </div>
            <div class="troop-card" data-role="PRIEST" data-cost="40">
                <img src="assets/UI Elements/UI Elements/Human Avatars/Priest.png" alt="Priest">
                <div class="name">Sacerdote</div><div class="cost">40 <div class="coin-icon"></div></div>
            </div>
        </div>
        <div class="queue-container">
            <h3 class="queue-title">Tropas Compradas para Desplegar:</h3>
            <div class="queue-list" id="queueList"></div>
        </div>
        <button class="btn-finish" id="btnFinish">Ir a la Arena a Colocar Tropas</button>
    </div>

    <script src="js/game.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Detectar recarga o navegacion atras y redirigir si es necesario
            const navEntries = window.performance.getEntriesByType('navigation');
            if (navEntries.length > 0 && (navEntries[0].type === 'reload' || navEntries[0].type === 'back_forward')) {
                localStorage.removeItem('ds_state');
                window.location.href = 'index.html';
                return;
            }
            let state = {}
            try {
                state = JSON.parse(localStorage.getItem('ds_state') || "{}");
            } catch (e) {
                console.error("Error al cargar ds_state:", e);
            }
            
            let level = state.level || 1;
            let coins = state.coins || 100;
            let queue = state.queue || [];
            
            const ROLE_NAMES  = { "WARRIOR": "Guerrero", "ROGUE": "Picaro", "ARCHER": "Arquero", "PRIEST": "Sacerdote" };
            const ROLE_COSTS  = { "WARRIOR": 35, "ROGUE": 30, "ARCHER": 30, "PRIEST": 40 };
            const ROLE_ICONS  = {
                "WARRIOR": "assets/UI Elements/UI Elements/Human Avatars/Warrior.png",
                "ROGUE":   "assets/UI Elements/UI Elements/Human Avatars/Rogue.png",
                "ARCHER":  "assets/UI Elements/UI Elements/Human Avatars/Archer.png",
                "PRIEST":  "assets/UI Elements/UI Elements/Human Avatars/Priest.png"
            };

            const coinsEl     = document.getElementById("shopCoins");
            const levelEl     = document.getElementById("shopLevelTitle");
            const queueListEl = document.getElementById("queueList");
            const cards       = document.querySelectorAll(".troop-card");
            
            levelEl.textContent = `Puesto Avanzado - Oleada ${level}`;
            
            function updateUI() {
                coinsEl.textContent = coins;

                // Habilitar/deshabilitar tarjetas según monedas
                cards.forEach(card => {
                    card.classList.toggle("disabled", coins < parseInt(card.dataset.cost));
                });

                // Cola agrupada: mostrar icono + nombre + xN
                queueListEl.innerHTML = "";
                const grouped = {};
                queue.forEach(role => { grouped[role] = (grouped[role] || 0) + 1; });

                const ORDER = ["WARRIOR", "ROGUE", "ARCHER", "PRIEST"];
                ORDER.forEach(role => {
                    if (!grouped[role]) return;
                    const count = grouped[role];
                    const el = document.createElement("div");
                    el.className = "queue-item";
                    el.innerHTML = `<img src="${ROLE_ICONS[role]}" alt="${ROLE_NAMES[role]}" style="width:28px;height:28px;object-fit:contain;vertical-align:middle;"> ${ROLE_NAMES[role]} <em style="color:#ffd700;font-style:normal;font-weight:bold;">x${count}</em> <span data-role="${role}" title="Quitar uno">✕</span>`;
                    queueListEl.appendChild(el);
                });
            }
            
            // Comprar tropa
            cards.forEach(card => {
                card.addEventListener("click", () => {
                    const role = card.dataset.role;
                    const cost = parseInt(card.dataset.cost);
                    if (coins >= cost) {
                        coins -= cost;
                        queue.push(role);
                        if (typeof AudioManager !== "undefined") AudioManager.playSFX("swordImpact");
                        updateUI();
                    }
                });
            });
            
            // Quitar una unidad de ese rol (devuelve el coste)
            queueListEl.addEventListener("click", (e) => {
                if (e.target.tagName === "SPAN" && e.target.dataset.role) {
                    const role = e.target.dataset.role;
                    const lastIdx = queue.lastIndexOf(role);
                    if (lastIdx !== -1) {
                        queue.splice(lastIdx, 1);
                        coins += ROLE_COSTS[role];
                        updateUI();
                    }
                }
            });
            
            document.getElementById("btnFinish").addEventListener("click", () => {
                state.level = level;
                state.coins = coins;
                state.queue = queue;
                localStorage.setItem('ds_state', JSON.stringify(state));
                if (typeof AudioManager !== "undefined") AudioManager.playSFX("swordImpact");
                window.allowTransition = true;
                window.location.href = "game.html";
            });

            // Arrancar música al primer clic (política de autoplay del navegador)
            document.body.addEventListener("click", () => {
                if (typeof AudioManager !== "undefined") {
                    if (AudioManager.audioContext && AudioManager.audioContext.state === 'suspended') {
                        AudioManager.audioContext.resume();
                    }
                    if (!AudioManager.musicMuted && !AudioManager.currentTrack) {
                        AudioManager.playMusic("menu");
                    }
                }
            }, { once: true });

            // Reproducir música de menú si no está silenciada
            if (typeof AudioManager !== "undefined" && !AudioManager.musicMuted) {
                AudioManager.playMusic("menu");
            }
            
            updateUI();
        });
    </script>
</body>
</html>
